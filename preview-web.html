<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>웹 버전 미리보기</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top, rgba(27, 56, 76, 0.52), rgba(6, 7, 8, 0) 48%),
          #060708;
        color: #f4f7f6;
        font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      }

      body {
        padding: 24px;
      }

      .preview-shell {
        display: grid;
        gap: 16px;
      }

      .preview-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .preview-title {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }

      .preview-link {
        color: #b9ffe2;
        text-decoration: none;
        font-size: 13px;
      }

      .preview-stage {
        width: min(100%, 1480px);
        height: calc(100vh - 104px);
        margin: 0 auto;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 22px;
        overflow: hidden;
        box-shadow:
          0 24px 80px rgba(0, 0, 0, 0.4),
          0 0 0 1px rgba(255, 255, 255, 0.04) inset;
        background: #000000;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: #000000;
      }
    </style>
  </head>
  <body>
    <div class="preview-shell">
      <div class="preview-head">
        <h1 class="preview-title">웹 버전 미리보기</h1>
        <a class="preview-link" href="./index.html">원본 열기</a>
      </div>
      <div class="preview-stage">
        <iframe src="./index.html" title="웹 버전 미리보기" allow="autoplay; fullscreen"></iframe>
      </div>
    </div>
  </body>
</html>
